<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>USA Academic Integrity Icons &middot; Assignment Guidelines Builder</title>
<meta name="description" content="University of South Alabama academic integrity icons for assignments. Build a copy-paste badge set for Canvas. AI guidance based on the AI Assessment Scale (AIAS). Original code by mwatkins03-netizen: https://github.com/mwatkins03-netizen/Academic-Integrity-Icons-Claude-4.8-/tree/main"> 
<style>
  :root{
    --navy:#00205B;       
    --red:#BFOD3E;        
    --powder:#67C9D1;    
    --ink:#1f2733;
    --muted:#5b6573;
    --line:#e4e7ec;
    --bg:#f4f5f7;
    --card:#ffffff;
    --yes:#1E7A46;
    --no:#CE1126;
    --cond:#C8852A;
    --info:#475569;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  a{color:var(--powder)}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  /* Brand bar */
  header.brand{background:var(--navy);color:#fff;border-bottom:5px solid var(--red)}
  header.brand .wrap{display:flex;align-items:center;gap:16px;padding:18px 20px}
  .crest{flex:0 0 auto}
  header.brand h1{font-size:20px;margin:0;font-weight:700;letter-spacing:.2px}
  header.brand p{margin:2px 0 0;font-size:13px;color:#c7d0dd}

  /* Tabs */
  nav.tabs{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  nav.tabs .wrap{display:flex;gap:4px;padding:0 20px}
  nav.tabs button{appearance:none;border:0;background:none;padding:14px 16px;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent}
  nav.tabs button:hover{color:var(--navy)}
  nav.tabs button.active{color:var(--navy);border-bottom-color:var(--red)}

  main{padding:26px 0 70px}
  .panel{display:none}
  .panel.active{display:block}
  h2.section{font-size:22px;color:var(--navy);margin:0 0 6px}
  p.lead{color:var(--muted);margin:0 0 22px;max-width:760px}

  /* Builder layout */
  .builder{display:grid;grid-template-columns:1.05fr .95fr;gap:26px;align-items:start}
  @media (max-width:880px){.builder{grid-template-columns:1fr}}

  .cat-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .cat-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .cat-head .mini{flex:0 0 auto}
  .cat-head .t{flex:1}
  .cat-head .t b{display:block;font-size:15px;color:var(--navy)}
  .cat-head .t span{font-size:12.5px;color:var(--muted)}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);cursor:pointer;user-select:none}
  .toggle input{width:16px;height:16px;accent-color:var(--navy)}
  .pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;color:var(--ink);cursor:pointer;transition:.12s}
  .pill:hover{border-color:#b9c1cd}
  .pill.sel{border-color:var(--navy);background:var(--navy);color:#fff}
  .cat-card.off{opacity:.5}
  .cat-card.off .pills{pointer-events:none}

  /* AIAS pills colored */
  .pill.ai.sel{border-color:transparent;color:#fff}

  /* Preview side */
  .sticky{position:sticky;top:70px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .preview-card{border:2px solid var(--navy);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 6px 22px rgba(20,33,61,.08)}
  .preview-card .pc-head{background:var(--navy);color:#fff;padding:12px 16px;font-weight:700;font-size:16px;display:flex;align-items:center;gap:10px}
  .preview-card .pc-body{padding:6px 16px 12px}
  .pc-foot{background:#f8f8f8;color:#7b8493;font-size:11px;padding:8px 16px;border-top:1px solid var(--line)}
  .row{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .row .b{flex:0 0 auto}
  .row .txt b{display:block;color:var(--navy);font-size:14.5px}
  .row .txt .st{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .row .txt p{margin:3px 0 0;font-size:13.5px;color:#3a4250}
  .empty{padding:30px;text-align:center;color:var(--muted);border:2px dashed var(--line);border-radius:12px}

  .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .btn{appearance:none;border:0;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--navy);color:#fff}
  .btn.primary:hover{background:#1d2e52}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--navy)}
  .btn.ghost:hover{border-color:#b9c1cd}
  textarea.code{width:100%;margin-top:14px;height:150px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:10px;color:#374151;background:#fbfbfc}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}

  /* Reference */
  .ref-cat{margin:0 0 30px}
  .ref-cat h3{font-size:16px;color:var(--navy);margin:0 0 4px;display:flex;align-items:center;gap:10px}
  .ref-cat .desc{font-size:13px;color:var(--muted);margin:0 0 14px}
  .ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .ref-item{border:1px solid var(--line);border-radius:10px;background:#fff;padding:14px;text-align:center}
  .ref-item .lab{font-weight:700;color:var(--navy);font-size:13.5px;margin-top:8px}
  .ref-item .st
